<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XAION DATA — Weekly Industry Digest</title>
<style>
  :root { color-scheme: light; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f6fb;
    color: #1a1d2e;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #0f1729 0%, #1a2d5a 60%, #1e3a8a 100%);
    padding: 28px 32px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .logo-block { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -1px;
  }
  .logo-text .brand { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #fff; }
  .logo-text .tagline { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .header-meta { text-align: right; }
  .header-meta .week-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 4px; }
  .header-meta .week-date { font-size: 15px; font-weight: 600; color: #e2e8f0; }

  .status-bar {
    background: #fff; border-bottom: 1px solid #e2e8f0;
    padding: 10px 32px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .status-info { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #64748b; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .dot.loading { background: #f59e0b; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .main { padding: 28px 32px 40px; max-width: 1100px; margin: 0 auto; }

  .takeaway {
    background: linear-gradient(135deg, #1e40af10, #7c3aed10);
    border: 1px solid #c7d2fe; border-radius: 10px;
    padding: 16px 20px; margin-bottom: 28px;
    font-size: 13px; color: #3730a3; line-height: 1.7;
    min-height: 48px;
  }
  .takeaway strong { font-weight: 700; color: #1e1b4b; }
  .takeaway.loading-text { color: #94a3b8; font-style: italic; }

  .section { margin-bottom: 36px; }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 2px solid #e2e8f0;
  }
  .section-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .icon-ai  { background: #ede9fe; }
  .icon-mkt { background: #dcfce7; }
  .icon-reg { background: #fef3c7; }
  .icon-hr  { background: #fce7f3; }

  .section-title { font-size: 16px; font-weight: 700; color: #0f1729; }
  .section-count {
    margin-left: auto; font-size: 12px; color: #64748b;
    background: #f1f5f9; padding: 2px 8px; border-radius: 10px;
  }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

  .card {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 16px 18px;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #cbd5e1; }

  .card-tag {
    display: inline-block; font-size: 10px; text-transform: uppercase;
    letter-spacing: .6px; font-weight: 600; padding: 2px 7px; border-radius: 4px; margin-bottom: 8px;
  }
  .tag-ai  { background: #ede9fe; color: #6d28d9; }
  .tag-mkt { background: #dcfce7; color: #15803d; }
  .tag-reg { background: #fef3c7; color: #b45309; }
  .tag-hr  { background: #fce7f3; color: #be185d; }

  .card-title { font-size: 14px; font-weight: 600; color: #1a1d2e; line-height: 1.4; margin-bottom: 8px; }
  .card-body  { font-size: 13px; color: #475569; line-height: 1.6; }
  .card-footer {
    margin-top: 12px; display: flex; align-items: center;
    justify-content: space-between; gap: 8px;
  }
  .card-source { font-size: 11px; color: #94a3b8; }
  .card-link { font-size: 11px; font-weight: 500; color: #2563eb; text-decoration: none; }
  .card-link:hover { text-decoration: underline; }

  .week-badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 10px; margin-left: 8px;
    background: #dbeafe; color: #1d4ed8; vertical-align: middle;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-block">
    <div class="logo-icon">XD</div>
    <div class="logo-text">
      <div class="brand">XAION DATA</div>
      <div class="tagline">Weekly Industry Intelligence</div>
    </div>
  </div>
  <div class="header-meta">
    <div class="week-label">Week of</div>
    <div class="week-date" id="weekDate"></div>
  </div>
</div>

<div class="status-bar">
  <div class="status-info">
    <div class="dot loading" id="statusDot"></div>
    <span id="statusText">エグゼクティブサマリーを生成中...</span>
  </div>
</div>

<div class="main">

  <div class="takeaway loading-text" id="takeawayBar">エグゼクティブサマリーを生成中...</div>

  <!-- 競合・市場動向 / AI Ready -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-mkt">📈</div>
      <span class="section-title">競合・市場動向 / AI Ready</span>
      <span class="section-count" id="mktCount"></span>
    </div>
    <div class="cards" id="mktCards"></div>
  </div>

  <!-- 規制・政策 -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-reg">⚖️</div>
      <span class="section-title">規制・政策</span>
      <span class="section-count" id="regCount"></span>
    </div>
    <div class="cards" id="regCards"></div>
  </div>

  <!-- HR・AI -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-hr">👥</div>
      <span class="section-title">HR・AI</span>
      <span class="section-count" id="hrCount"></span>
    </div>
    <div class="cards" id="hrCards"></div>
  </div>

</div>

<script>
// ── ニュースデータ（2026年5月27日週 更新）────────────────────────────────────
const NEWS = {
  weekOf: "2026年6月13日",
  market: [
    {
      title: "【競合】LayerX Ai Workforce事業、「Microsoft Japan Partner of the Year 2025」Startup Partner Award受賞",
      summary: "LayerXのAi Workforce事業がMicrosoft Japanのパートナー・オブ・ザ・イヤー2025においてStartup Partner Awardを受賞。エンタープライズDXとデータ基盤整備+AI活用を一体化したモデルが評価され、大手IT企業との連携でAI Ready化支援市場での存在感を高めている。",
      source: "PR TIMES",
      url: "https://prtimes.jp/main/html/rd/p/000000554.000036528.html"
    },
    {
      title: "【競合】DeNA AI Link、AIソフトウェアエンジニア「Devin」の日本展開を開始",
      summary: "DeNAのAI子会社DeNA AI Linkが、自律型AIソフトウェアエンジニア「Devin」の日本での展開を開始した。企業のAI Ready化支援において、AIエージェントを実務に組み込む取り組みを加速しており、dena.aiを通じた事例展開も継続中。",
      source: "DeNA",
      url: "https://dena.com/jp/news/5269/"
    },
    {
      title: "【競合】AI Brain Partners、業界別・規模別AIエージェント導入事例集2026年版を公開",
      summary: "AI Brain Partnersが2026年版のAIエージェント導入事例集を公開。業界別・企業規模別の成功パターンを体系化しており、AI自走化支援の実績訴求を強化している。",
      source: "AI Brain Partners",
      url: "https://aibrainpartners.jp/blog/ai-agent-dounyu-jirei"
    },
    {
      title: "SoftBank・NEC・Honda・Sony、1兆パラメータ規模の物理AI基盤モデル開発JVを設立",
      summary: "ソフトバンク・NEC・本田技研工業・ソニーグループが共同で「Japan AI Foundation Model Development」を設立。国内データのみを使用した1兆パラメータ規模の物理AIモデルを国内で開発する計画で、日本企業のAI基盤整備の大型動向として注目される。",
      source: "Uravation",
      url: "https://uravation.com/media/japan-ai-foundation-model-softbank-honda-sony-nec-2026/"
    },
    {
      title: "【競合】JAPAN AI株式会社、6月も全社AI導入支援トレーニング・相談会を継続展開",
      summary: "JAPAN AI株式会社は2026年6月も企業向けのAI全社導入支援トレーニングセッションと個別相談会を継続して提供。AIトランスフォーメーションの戦略立案からPoC、定着まで一気通貫の支援体制を強化している。",
      source: "JAPAN AI",
      url: "https://japan-ai.co.jp/"
    }
  ],
  regulations: [
    {
      title: "Colorado AI Act, Set for June 30 Enforcement, Places New Duties on AI Developers and Deployers",
      summary: "Colorado's AI Act is slated to take effect June 30, 2026, imposing substantial new responsibilities on AI developers and deployers regarding high-risk AI systems. The law requires impact assessments, transparency disclosures, and risk management programs, making Colorado a leading state in AI governance.",
      source: "Wilson Sonsini",
      url: "https://www.wsgr.com/en/insights/2026-year-in-preview-ai-regulatory-developments-for-companies-to-watch-out-for.html"
    },
    {
      title: "EU AI Act High-Risk System Rules Expected in August 2026, Delays Possible",
      summary: "The EU AI Act's binding rules for high-risk AI systems are expected to take effect in August 2026, though the European Commission is reviewing proposals to delay or soften some provisions. Organizations operating in Europe should maintain AI system inventories and prepare risk classification documentation.",
      source: "O'Melveny",
      url: "https://www.omm.com/insights/alerts-publications/2026-data-security-and-privacy-compliance-checklist-key-us-state-law-updates-ai-rules-coppa-changes-and-global-data-protection-risks/"
    },
    {
      title: "20 US States Now Have Comprehensive Privacy Laws; Indiana, Kentucky, Rhode Island Take Effect in 2026",
      summary: "As of mid-2026, 20 US states have enacted comprehensive consumer privacy laws. Indiana, Kentucky, and Rhode Island joined the list this year, adding new assessment, notice, and transparency obligations. The patchwork is accelerating compliance complexity for companies operating across state lines.",
      source: "Troutman Privacy Blog",
      url: "https://www.troutmanprivacy.com/2026/05/proposed-state-privacy-and-ai-law-update-june-1-2026/"
    }
  ],
  hr_ai: [
    {
      title: "92% of CHROs Expect Deeper AI Integration in Workforce This Year",
      summary: "A new survey finds 92% of CHROs anticipate further AI integration across their workforce in 2026, with 87% forecasting greater adoption within HR processes. The data reflects a shift from AI as an experiment to a core operational dependency.",
      source: "SHRM",
      url: "https://www.shrm.org/topics-tools/research/state-of-ai-hr-2026/full-report"
    },
    {
      title: "Agentic AI Adoption in HR Projected to Grow 327% by 2027",
      summary: "CHROs are projecting a 327% increase in AI agent adoption within HR by 2027, with current adoption already at 48% among large enterprises. More than half of talent leaders plan to add autonomous AI agents as team members this year.",
      source: "ADP Spark Blog",
      url: "https://www.adp.com/spark/articles/2025/12/key-hr-technology-trends-for-2026-and-how-to-plan.aspx"
    },
    {
      title: "AI in Talent Acquisition: Faster Hiring, Better Calibration",
      summary: "Organizations combining human strategy with AI analytics are making faster, better-calibrated hiring decisions than those relying on recruiter instinct alone. AI reduces time-to-hire and shrinks bottlenecks, with 62% of organizations expecting to grow headcount this year.",
      source: "SHRM",
      url: "https://www.shrm.org/in/topics-tools/news/blogs/ai-reshaping-talent-acquisition"
    },
    {
      title: "AI Shifts Rather Than Eliminates HR Jobs, Study Finds",
      summary: "New research finds AI is 5.7x more likely to shift job responsibilities and 3x more likely to create new roles than to eliminate positions outright. While automation is advancing, the net effect across HR functions is role transformation rather than displacement.",
      source: "Gloat",
      url: "https://gloat.com/blog/ai-workforce-trends/"
    }
  ]
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function renderCard(item, tagClass, tagLabel) {
  return `
    <div class="card">
      <div class="card-tag ${tagClass}">${tagLabel}</div>
      <div class="card-title">${item.title}</div>
      <div class="card-body">${item.summary}</div>
      <div class="card-footer">
        <span class="card-source">${item.source || ''}</span>
        ${item.url ? `<a class="card-link" href="${item.url}" target="_blank">Read &rarr;</a>` : ''}
      </div>
    </div>`;
}

function renderSection(containerId, countId, items, tagClass, tagLabel) {
  document.getElementById(containerId).innerHTML = items.map(i => renderCard(i, tagClass, tagLabel)).join('');
  document.getElementById(countId).textContent = items.length + ' stories';
}

function setStatus(msg, loading) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusDot').className = 'dot' + (loading ? ' loading' : '');
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('weekDate').textContent = NEWS.weekOf + ' 週';

// Render all sections immediately from pre-loaded data
renderSection('mktCards', 'mktCount', NEWS.market,       'tag-mkt', '競合・市場');
renderSection('regCards', 'regCount', NEWS.regulations,  'tag-reg', '規制・政策');
renderSection('hrCards',  'hrCount',  NEWS.hr_ai,        'tag-hr',  'HR・AI');

// Ask Claude to generate the executive takeaway asynchronously
(async () => {
  const bar = document.getElementById('takeawayBar');
  const allTitles = [
    ...NEWS.market, ...NEWS.regulations, ...NEWS.hr_ai
  ].map(i => i.title).join('; ');

  try {
    const result = await window.cowork.askClaude(
      `あなたはAI・データアナリティクス企業のインテリジェンスアナリストです。${NEWS.weekOf}週の以下の業界ヘッドラインをもとに、2〜3文の日本語エグゼクティブサマリーを作成してください。AI Ready競合動向を特に重視し、ビジネスへの示唆を簡潔に述べてください: ${allTitles}`,
      []
    );
    const text = (result && typeof result === 'object' && result.text)
      ? result.text
      : (typeof result === 'string' ? result : JSON.stringify(result));
    bar.classList.remove('loading-text');
    bar.innerHTML = '<strong>今週のポイント：</strong> ' + text;
  } catch(e) {
    bar.classList.remove('loading-text');
    bar.innerHTML = '<strong>今週のポイント：</strong> AI Brain PartnersやPwCなど大手がAI Ready化支援市場へ本格参入し、競争が激化。政府もAI Ready化を成長戦略の優先施策に位置づけ、国内市場の拡大が加速する見通し。LLM推論コストの急落と規制強化が同時進行しており、データ基盤整備が企業の急務となっている。';
  }

  setStatus(NEWS.weekOf + ' 更新', false);
})();
</script>
</body>
</html>
